<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Keyboard Button</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="btn-3d-keyboard">

        <div class="side-cont">
            <div class="sidebars1"></div>
            <div class="sidebars2"></div>
            <div class="sidebars3"></div>
            <div class="sidebars4"></div>
        </div>

        <div class="container">
            <div class="text-before">
                <div class="text">Click me!</div>
            </div>
        </div>
    </button>
</body>

</html>
